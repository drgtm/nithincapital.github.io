<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8783a"/>
      <stop offset="50%" stop-color="#e8b563"/>
      <stop offset="100%" stop-color="#f4d68f"/>
    </linearGradient>
  </defs>
  <!-- dark background -->
  <rect width="100" height="100" rx="20" fill="#05070e"/>
  <!-- centerline baseline (the phone line) -->
  <line x1="14" y1="50" x2="86" y2="50" stroke="#e8b563" stroke-width="1" opacity="0.22"/>
  <!-- soundwave: vertical bars of varying height, symmetric about the centerline -->
  <g stroke="url(#wave)" stroke-width="4.2" stroke-linecap="round">
    <line x1="20" y1="44" x2="20" y2="56"/>
    <line x1="30" y1="34" x2="30" y2="66"/>
    <line x1="40" y1="24" x2="40" y2="76"/>
    <line x1="50" y1="16" x2="50" y2="84"/>
    <line x1="60" y1="30" x2="60" y2="70"/>
    <line x1="70" y1="38" x2="70" y2="62"/>
    <line x1="80" y1="46" x2="80" y2="54"/>
  </g>
</svg>
