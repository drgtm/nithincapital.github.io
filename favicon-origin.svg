<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff5e0"/>
      <stop offset="18%" stop-color="#f4d68f"/>
      <stop offset="45%" stop-color="#e8b563"/>
      <stop offset="72%" stop-color="#c8783a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c8783a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffaf0"/>
      <stop offset="60%" stop-color="#fbeccb"/>
      <stop offset="100%" stop-color="#f0c890"/>
    </radialGradient>
  </defs>
  <!-- dark background -->
  <rect width="100" height="100" rx="20" fill="#05070e"/>
  <!-- radial rays -->
  <g stroke="#e8b563" stroke-width="1.4" stroke-linecap="round" opacity="0.55">
    <line x1="50" y1="50" x2="50" y2="16"/>
    <line x1="50" y1="50" x2="50" y2="84"/>
    <line x1="50" y1="50" x2="16" y2="50"/>
    <line x1="50" y1="50" x2="84" y2="50"/>
    <line x1="50" y1="50" x2="26" y2="26"/>
    <line x1="50" y1="50" x2="74" y2="74"/>
    <line x1="50" y1="50" x2="74" y2="26"/>
    <line x1="50" y1="50" x2="26" y2="74"/>
  </g>
  <!-- faint diagonal shorter rays -->
  <g stroke="#e8b563" stroke-width="1" stroke-linecap="round" opacity="0.3">
    <line x1="50" y1="50" x2="62" y2="20"/>
    <line x1="50" y1="50" x2="38" y2="80"/>
    <line x1="50" y1="50" x2="80" y2="38"/>
    <line x1="50" y1="50" x2="20" y2="62"/>
    <line x1="50" y1="50" x2="38" y2="20"/>
    <line x1="50" y1="50" x2="62" y2="80"/>
    <line x1="50" y1="50" x2="80" y2="62"/>
    <line x1="50" y1="50" x2="20" y2="38"/>
  </g>
  <!-- glow halo -->
  <circle cx="50" cy="50" r="30" fill="url(#glow)"/>
  <!-- bright core -->
  <circle cx="50" cy="50" r="11" fill="url(#core)"/>
</svg>
